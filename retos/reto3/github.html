<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./github.css"/>
</head>
<body>
    <div class="container">
        <!-- 1RA SECCION TITULO - BOTON -->
        <div class="section-1">
            <h4 class="title">devfinder</h4>
            <button class="btn-mode"> 
                <img width="20" src="./images/sun.png" alt="">LIGHT
            </button>
        </div>
        <!-- 2DA SECCION BUSCADOR -->
        <div class="search-container">
            <div class="input-container">
                <img width="20" src="./images/search_1.png" alt="">
                <input class="input-search" type="text" placeholder="Search GitHub username...">
            </div>
            <div>
                <button class="btn-search">Search</button>
            </div>
        </div>
        <!-- 3RA SECCION MUESTRA INFORMACION -->
        <div class="information-container">
            <!-- Imagen del perfil -->
            <div class="image-container">
                <img width="120" src="./images/profile.jpg" alt="">
            </div>
            <!-- Descripcion del perfil -->
            <div class="description-container">
                <!-- Username y año de union -->
                <div class="user-date-container">
                    <h2>The Octocat</h2>
                    <p>Joined 25 Jun 2011</p>
                </div>
                <!-- Username y bio -->
                <div class="user-bio-container">
                    <p>@Octocat</p>
                    <p>This profile has no bio</p>
                </div>
                <!-- Card con respos, followers, following -->
                <div class="card-information">
                    <div>
                        <h5>Repos</h5>
                        <h2>8</h2>
                    </div>
                    <div>
                        <h5>Follower</h5>
                        <h2>3938</h2>
                    </div>
                    <div>
                        <h5>Following</h5>
                        <h2>9</h2>
                    </div>
                </div>
                <!-- Ubi, Twitter, link, username -->
                <div class="info-container">
                    <div>
                        <p><img width="15" src="./images/pin.png" alt="">&nbsp;San Francisco</p>
                        <p><img width="15" src="./images/twitter.png" alt="">&nbsp;Not avaible</p>
                    </div>
                    <div>
                        <p><img width="15" src="./images/link.png" alt="">&nbsp;https://github.blog</p>
                        <p><img width="15" src="./images/hotel.png" alt="">&nbsp;@rccardenas</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
